; PlatformIO project — K3NG rotator controller for RCA 10W707
;
; K3NG source is a git submodule at firmware/k3ng/.
; Run from this directory: pio run
; Flash:                   pio run --target upload
; Serial monitor:          pio device monitor
;
; The copy_config.py pre-build script patches 6 lines in K3NG's defaults.
; Reset the submodule after building: git -C k3ng checkout -- .

[platformio]
src_dir     = k3ng/k3ng_rotator_controller
default_envs = nano_new

; rotator_k3ngdisplay.h already defines FEATURE_4_BIT_LCD_DISPLAY unconditionally
; (it's the canonical display-type selection file in K3NG).
; LiquidCrystal is not bundled with PlatformIO's AVR framework — must be explicit.
[env]
framework     = arduino
extra_scripts = pre:copy_config.py
lib_deps      = arduino-libraries/LiquidCrystal@^1.0.7
monitor_speed = 9600

; CH340 Nano from hestore.hu (prod_10044467) — old bootloader, 57600 upload
[env:nano_old]
platform     = atmelavr
board        = nanoatmega328
upload_speed = 57600

; New-bootloader variant (post-2018 genuine Arduino Nano)
[env:nano_new]
platform     = atmelavr
board        = nanoatmega328new
upload_speed = 115200
